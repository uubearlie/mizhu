<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>活动信息</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-page="">
<div class="app">

  <!-- ===== App Bar ===== -->
  <div class="app-bar">
    <a href="index.html" class="btn-back">←</a>
    <h1 id="pageTitle">新建活动</h1>
    <span style="width: 40px;"></span>
  </div>

  <!-- ===== Form Content ===== -->
  <div style="flex: 1; overflow-y: auto; padding-bottom: 80px;">

    <!-- ----- Section 1: 基本信息 ----- -->
    <div class="form-section">
      <div class="section-header">
        基本信息
      </div>
      <div class="section-body">
        <div class="form-row">
          <label class="form-label required">活动名称</label>
          <div class="form-value">
            <input type="text" id="actName" placeholder="第16期迷住团购">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">开始日期</label>
          <div class="form-value">
            <input type="date" id="actStart">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">结束日期</label>
          <div class="form-value">
            <input type="date" id="actEnd">
          </div>
        </div>
      </div>
    </div>

    <!-- ----- Section 2: 大套购规则 ----- -->
    <div class="form-section">
      <div class="section-header">
        大套购规则
      </div>
      <div class="section-body">

        <!-- 启用开关 -->
        <div class="check-row checked">
          <div class="checkbox">✓</div>
          <span class="check-label">启用大套购</span>
        </div>

        <!-- 档位列表 -->
        <div style="border-top: 1px solid #f2f3f5; margin-top: 4px;">

          <div class="form-row" style="gap: 8px;">
            <span class="input-prefix">满</span>
            <input type="text" placeholder="3000" inputmode="numeric" style="flex: 1;" value="3000">
            <span class="input-prefix">返</span>
            <input type="text" placeholder="100" inputmode="numeric" style="flex: 1;" value="100">
            <span style="color: #ee0a24; font-size: 16px; padding: 0 4px; cursor:pointer;">✕</span>
          </div>

          <div class="form-row" style="gap: 8px;">
            <span class="input-prefix">满</span>
            <input type="text" placeholder="5000" inputmode="numeric" style="flex: 1;" value="5000">
            <span class="input-prefix">返</span>
            <input type="text" placeholder="200" inputmode="numeric" style="flex: 1;" value="200">
            <span style="color: #ee0a24; font-size: 16px; padding: 0 4px; cursor:pointer;">✕</span>
          </div>

          <div class="form-row" style="gap: 8px;">
            <span class="input-prefix">满</span>
            <input type="text" placeholder="10000" inputmode="numeric" style="flex: 1;" value="10000">
            <span class="input-prefix">返</span>
            <input type="text" placeholder="500" inputmode="numeric" style="flex: 1;" value="500">
            <span style="color: #ee0a24; font-size: 16px; padding: 0 4px; cursor:pointer;">✕</span>
          </div>

        </div>

        <!-- 添加档位 -->
        <button style="width: 100%; margin-top: 12px; padding: 12px; border: 1px dashed #c8c9cc; border-radius: 8px; background: #f7f8fa; color: #969799; font-size: 14px;">➕ 添加档位</button>

      </div>
    </div>

  </div>

  <!-- ===== Fixed Bottom Save Button ===== -->
  <div style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; padding: 12px 16px; border-top: 1px solid #ebedf0; z-index: 50; padding-bottom: calc(12px + env(safe-area-inset-bottom));">
    <a href="index.html" class="btn btn-primary" style="width: 100%; margin: 0; text-align:center;">保存</a>
  </div>

</div>
<script src="app.js"></script>
<script>
// 编辑模式：URL 带 edit=1 时填充数据
(function() {
  var params = new URLSearchParams(location.search);
  if (params.get('edit') === '1') {
    document.getElementById('pageTitle').textContent = '编辑活动';
    document.getElementById('actName').value = params.get('name') || '第15期迷住团购';
    document.getElementById('actStart').value = params.get('start') || '2024-06-01';
    document.getElementById('actEnd').value = params.get('end') || '2024-06-30';
  }
})();
</script>
</body>
</html>
