<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老板烟机62Y - 商品详情</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-page="">
<div class="app">

  <!-- ===== App Bar ===== -->
  <div class="app-bar">
    <a href="items.html" class="btn-back">‹</a>
    <h1>老板烟机62Y</h1>
    <a href="#" class="btn-text">编辑</a>
  </div>

  <div class="page-content" style="padding-bottom: 76px;">

    <!-- ===== 到手价 Hero Card ===== -->
    <div class="card" style="background: linear-gradient(135deg, #1989fa, #0a6cd4); margin-top: 12px;">
      <div class="card-body" style="text-align: center; color: #fff; padding: 24px 16px 20px;">
        <div style="font-size: 13px; opacity: .85; margin-bottom: 6px;">到手价</div>
        <div style="font-size: 38px; font-weight: 700; letter-spacing: -1px; line-height: 1.1;">¥2,133.00</div>
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 13px; opacity: .9;">
          <span>下单价 ¥3,500</span>
          <span style="opacity: .5;">·</span>
          <span>返 ¥1,367</span>
        </div>
        <div style="margin-top: 12px;">
          <span class="tag" style="background: rgba(255,255,255,.2); color: #fff;">返现率 39.1%</span>
        </div>
      </div>
    </div>

    <!-- ===== 基本信息 ===== -->
    <div class="card">
      <div class="card-header">基本信息</div>
      <div class="card-body">
        <div class="form-row">
          <span class="form-label">途径</span>
          <span class="form-value">淘宝</span>
        </div>
        <div class="form-row">
          <span class="form-label">订单号</span>
          <span class="form-value">2024062612345678</span>
        </div>
        <div class="form-row">
          <span class="form-label">下单价</span>
          <span class="form-value text-bold">¥3,500</span>
        </div>
        <div class="form-row">
          <span class="form-label">收货</span>
          <span class="form-value">06/26 <span class="text-green">✅</span></span>
        </div>
        <div class="form-row">
          <span class="form-label">赠品</span>
          <span class="form-value text-gray">—</span>
        </div>
      </div>
    </div>

    <!-- ===== 保价信息 ===== -->
    <div class="card">
      <div class="card-header">保价信息</div>
      <div class="card-body">
        <div class="form-row">
          <span class="form-label">平台保价</span>
          <span class="form-value">退款 <span class="text-bold text-red">¥200</span></span>
        </div>
        <div class="form-row">
          <span class="form-label">店铺保价</span>
          <span class="form-value">退款 <span class="text-bold text-red">¥100</span></span>
        </div>
        <div class="form-row">
          <span class="form-label">迷住保价</span>
          <span class="form-value"><span class="tag info">好价</span></span>
        </div>
      </div>
    </div>

    <!-- ===== 返现明细 ===== -->
    <div class="card">
      <div class="card-header">返现明细</div>
      <div class="card-body" style="padding-top: 12px;">

        <!-- 🏪 店铺侧 -->
        <div class="cashback-group" style="border: 1px solid #f2f3f5;">
          <div class="group-title">
            <span class="icon">🏪</span>店铺侧
          </div>
          <div class="cashback-entry">
            <span class="entry-name">平台保价</span>
            <span class="flex" style="align-items: center; gap: 8px;">
              <span class="entry-status received" style="margin-left: 0;">✅ 已收</span>
              <span class="entry-amount text-green">¥200</span>
            </span>
          </div>
          <div class="cashback-entry">
            <span class="entry-name">下单即返</span>
            <span class="flex" style="align-items: center; gap: 8px;">
              <span class="entry-status waiting" style="margin-left: 0;">⏳ 还剩5天</span>
              <span class="entry-amount">¥800</span>
            </span>
          </div>
          <div class="cashback-entry">
            <span class="entry-name">品牌套购</span>
            <span class="flex" style="align-items: center; gap: 8px;">
              <span class="entry-status waiting" style="margin-left: 0;">⏳ 还剩5天</span>
              <span class="entry-amount">¥35</span>
            </span>
          </div>
        </div>
        <div class="flex-between" style="padding: 10px 14px; font-size: 13px;">
          <span class="text-gray">店铺已返</span>
          <span class="text-bold text-green">¥200</span>
        </div>

        <!-- 🏠 迷住侧 -->
        <div class="cashback-group" style="border: 1px solid #f2f3f5; margin-top: 4px;">
          <div class="group-title">
            <span class="icon">🏠</span>迷住侧
          </div>
          <div class="cashback-entry">
            <span class="entry-name">迷住返</span>
            <span class="flex" style="align-items: center; gap: 8px;">
              <span class="entry-status waiting" style="margin-left: 0;">⏳ 还剩5天</span>
              <span class="entry-amount">¥200</span>
            </span>
          </div>
          <div class="cashback-entry">
            <span class="entry-name">大套购</span>
            <span class="flex" style="align-items: center; gap: 8px;">
              <span class="entry-status unsettled" style="margin-left: 0;">📋 未结算</span>
              <span class="entry-amount">¥132.08</span>
            </span>
          </div>
        </div>
        <div class="flex-between" style="padding: 10px 14px; font-size: 13px;">
          <span class="text-gray">迷住已返</span>
          <span class="text-bold text-gray">¥0</span>
        </div>

      </div>
    </div>

    <div style="height: 8px;"></div>

  </div>

  <!-- ===== Bottom Action Buttons (fixed) ===== -->
  <div style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; border-top: 1px solid #ebedf0; padding: 10px 12px; display: flex; gap: 12px; z-index: 100; padding-bottom: calc(10px + env(safe-area-inset-bottom));">
    <!-- 已确认收货，不显示确认收货按钮 -->
    <button class="btn btn-success">💰 收到返现</button>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
