<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>统计报表</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-page="reports">
<div class="app">

  <!-- App Bar -->
  <header class="app-bar">
    <h1>📊 统计报表</h1>
    <span class="btn-text">导出</span>
  </header>

  <div class="page-content">

    <!-- 本期总览 -->
    <div class="card">
      <div class="card-header">本期总览</div>
      <div class="card-body">
        <div class="overview-grid">
          <div class="overview-item">
            <span class="label">下单总额</span>
            <span class="value">¥45,200</span>
          </div>
          <div class="overview-item">
            <span class="label">总返现</span>
            <span class="value highlight">¥8,234</span>
          </div>
          <div class="overview-item">
            <span class="label">实际到手</span>
            <span class="value primary">¥36,966</span>
          </div>
          <div class="overview-item">
            <span class="label">返现率</span>
            <span class="value highlight">18.2%</span>
          </div>
        </div>
        <div class="progress-bar">
          <div class="fill" style="width: 73%;"></div>
        </div>
        <div class="progress-text">
          <span>已返 <span class="text-green text-bold">¥6,012</span></span>
          <span>待返 <span class="text-red text-bold">¥2,222</span></span>
          <span>进度 73%</span>
        </div>
      </div>
    </div>

    <!-- 返现构成 -->
    <div class="card">
      <div class="card-header">返现构成</div>
      <div class="card-body">
        <div class="bar-chart">
          <div class="bar-chart-row">
            <span class="bar-label">大套购</span>
            <div class="bar-track">
              <div class="bar-fill c-blue" style="width: 17%;">¥600</div>
            </div>
          </div>
          <div class="bar-chart-row">
            <span class="bar-label">品牌套购</span>
            <div class="bar-track">
              <div class="bar-fill c-purple" style="width: 60%;">¥2,100</div>
            </div>
          </div>
          <div class="bar-chart-row">
            <span class="bar-label">单品返现</span>
            <div class="bar-track">
              <div class="bar-fill c-green" style="width: 100%;">¥3,500</div>
            </div>
          </div>
          <div class="bar-chart-row">
            <span class="bar-label">神券</span>
            <div class="bar-track">
              <div class="bar-fill c-orange" style="width: 23%;">¥800</div>
            </div>
          </div>
          <div class="bar-chart-row">
            <span class="bar-label">保价</span>
            <div class="bar-track">
              <div class="bar-fill c-cyan" style="width: 35%;">¥1,234</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 历史趋势 -->
    <div class="card">
      <div class="card-header">历史趋势</div>
      <div class="card-body">
        <div class="overview-grid">
          <div class="overview-item">
            <span class="label">参与活动</span>
            <span class="value">5<span class="text-sm text-gray" style="font-weight:400;"> 期</span></span>
          </div>
          <div class="overview-item">
            <span class="label">累计返现</span>
            <span class="value highlight">¥34,500</span>
          </div>
        </div>
        <div class="overview-row">
          <div class="sub-item">
            <span class="label">累计省钱</span>
            <span class="value text-green">¥34,500</span>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /page-content -->

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" data-nav="home"><span class="nav-icon">🏠</span>首页</a>
    <a href="items.html" data-nav="items"><span class="nav-icon">📋</span>商品</a>
    <a href="pending.html" data-nav="pending"><span class="nav-icon">💰</span>待返</a>
    <a href="reports.html" data-nav="reports"><span class="nav-icon">📊</span>统计</a>
  </nav>

</div>
<script src="app.js"></script>
</body>
</html>
